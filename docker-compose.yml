services:
  postgres:
    image: postgres:15-alpine
    container_name: tictactoe_postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama:
    image: heroiclabs/nakama:3.21.1
    container_name: tictactoe_nakama
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7349:7349"   # client port (HTTP)
      - "7350:7350"   # API port
      - "7351:7351"   # console port
    environment:
      - NAKAMA_CONSOLE_PASSWORD=admin
    volumes:
      - ./server/modules:/nakama/data/modules
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up \
          --database.address postgres:localdb@postgres:5432/nakama && \
        exec /nakama/nakama \
          --name nakama \
          --database.address postgres:localdb@postgres:5432/nakama \
          --logger.level DEBUG \
          --session.token_expiry_sec 7200 \
          --socket.server_key "tictactoe-server-key"

volumes:
  postgres_data: